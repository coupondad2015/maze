<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Labyrinth + Maze ASCII Test Harness</title>
  <style>
    :root {
      --bg: #111;
      --panel: #1a1a1a;
      --text: #e8e8e8;
      --wall: #666;
      --labyrinth: #4fc3f7;
      --maze: #ffb74d;
      --connector: #ba68c8;
      --entry: #81c784;
      --exit: #e57373;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Consolas, Menlo, Monaco, monospace;
      padding: 20px;
      overflow: auto;
    }

    .panel {
      width: max-content;
      max-width: none;
      background: var(--panel);
      padding: 16px;
      border-radius: 12px;
      box-sizing: border-box;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }

    label {
      font-size: 14px;
    }

    input {
      width: 70px;
      background: #111;
      color: var(--text);
      border: 1px solid #3a3a3a;
      border-radius: 6px;
      padding: 6px 8px;
      font: inherit;
    }

    button {
      background: #262626;
      color: var(--text);
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font: inherit;
    }

    button:hover { background: #303030; }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .swatch {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      display: inline-block;
    }

    #grid {
      white-space: pre;
      font-size: 14px;
      line-height: 1;
      background: #000;
      padding: 12px;
      border-radius: 10px;
      overflow: visible;
      min-height: 0;
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="controls">
      <label>Width <input id="w" type="number" min="21" step="2" value="100" /></label>
      <label>Height <input id="h" type="number" min="21" step="2" value="50" /></label>
      <label>Core Radius <input id="core" type="number" min="5" step="1" value="12" /></label>
      <label>Lab Depth <input id="labDepth" type="number" min="1" max="7" step="1" value="4" /></label>
      <label>Speed <input id="speed" type="number" min="1" max="10" step="1" value="8" /></label>
      <label>Intelligence <input id="intelligence" type="number" min="1" max="10" step="1" value="9" /></label>
      <button id="regenBtn">Regenerate</button>
    </div>

    <div class="stats" id="stats" style="display:flex; flex-wrap:wrap; gap:12px 18px; margin-bottom:12px; font-size:14px;">
      <span>Iteration <strong id="iterationCount">0</strong>/100</span>
      <span>Elapsed <strong id="elapsedTime">00:00:000</strong></span>
      <span>Best Time <strong id="bestTime">--:--:---</strong></span>
      <span>Last Result <strong id="lastResult">—</strong></span>
      <span>Status <strong id="runStatus">Running</strong></span>
    </div>

    <div class="legend">
      <span><i class="swatch" style="background: var(--wall)"></i> Wall</span>
      <span><i class="swatch" style="background: var(--labyrinth)"></i> Labyrinth</span>
      <span><i class="swatch" style="background: var(--connector)"></i> Connector</span>
      <span><i class="swatch" style="background: var(--maze)"></i> Maze Core</span>
      <span><i class="swatch" style="background: var(--entry)"></i> Entry</span>
      <span><i class="swatch" style="background: var(--exit)"></i> Exit</span>
      <span><i class="swatch" style="background: #fff"></i> Mouse</span>
    </div>

    <div id="grid"></div>
  </div>

  <script>
    const WALL = '#';
    const LAB = '.';
    const MAZE = ':';
    const CONN = '+';
    const ENTRY = 'S';
    const EXIT = 'E';
    const MOUSE = 'm';

    let grid = [];
    let mousePos = null;
    let currentRunId = 0;
    let explorerState = null;

    const gridEl = document.getElementById('grid');
    const regenBtn = document.getElementById('regenBtn');
    const widthInput = document.getElementById('w');
    const heightInput = document.getElementById('h');
    const coreInput = document.getElementById('core');
    const labDepthInput = document.getElementById('labDepth');
    const iterationEl = document.getElementById('iterationCount');
    const elapsedEl = document.getElementById('elapsedTime');
    const bestTimeEl = document.getElementById('bestTime');
    const lastResultEl = document.getElementById('lastResult');
    const runStatusEl = document.getElementById('runStatus');

    const MAX_ITERATIONS = 100;
    let iterationCount = 0;
    let mapStartTime = 0;
    let bestTimeMs = null;
    let elapsedTimer = null;
    let isSessionComplete = false;

    function formatElapsed(ms) {
      const totalMs = Math.max(0, Math.floor(ms || 0));
      const minutes = Math.floor(totalMs / 60000);
      const seconds = Math.floor((totalMs % 60000) / 1000);
      const millis = totalMs % 1000;
      return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}:${String(millis).padStart(3, '0')}`;
    }

    function updateElapsedDisplay() {
      if (!mapStartTime) {
        elapsedEl.textContent = '00:00:000';
        return;
      }
      elapsedEl.textContent = formatElapsed(Date.now() - mapStartTime);
    }

    function startMapTimer() {
      mapStartTime = Date.now();
      updateElapsedDisplay();
      if (elapsedTimer) clearInterval(elapsedTimer);
      elapsedTimer = setInterval(updateElapsedDisplay, 43);
    }

    function stopMapTimer() {
      if (elapsedTimer) {
        clearInterval(elapsedTimer);
        elapsedTimer = null;
      }
      updateElapsedDisplay();
    }

    function updateStats() {
      iterationEl.textContent = String(iterationCount);
      bestTimeEl.textContent = bestTimeMs == null ? '--:--:---' : formatElapsed(bestTimeMs);
      runStatusEl.textContent = isSessionComplete ? 'Complete' : 'Running';
    }

    function finalizeRun(resultLabel) {
      stopMapTimer();
      lastResultEl.textContent = resultLabel;
      const elapsed = mapStartTime ? (Date.now() - mapStartTime) : null;
      if (resultLabel === 'Solved' && elapsed != null) {
        if (bestTimeMs == null || elapsed < bestTimeMs) {
          bestTimeMs = elapsed;
        }
      }
      updateStats();
    }

    function normalizeOdd(n, min = 21) {
      n = Math.max(min, parseInt(n, 10) || min);
      return (n % 2 === 0) ? n + 1 : n;
    }

    function computeMaxCoreRadius(w, h) {
      const cx = Math.floor(w / 2);
      const cy = Math.floor(h / 2);
      const outerRadius = Math.min(cx, cy) - 2;
      return Math.max(5, Math.floor((outerRadius - 6) / 2));
    }

    function sanitizeInputs() {
      let w = normalizeOdd(widthInput.value, 21);
      let h = normalizeOdd(heightInput.value, 21);
      let maxCore = computeMaxCoreRadius(w, h);
      let core = Math.max(5, Math.min(maxCore, parseInt(coreInput.value, 10) || 8));

      widthInput.value = w;
      heightInput.value = h;
      coreInput.max = maxCore;
      coreInput.value = core;

      return { w, h, coreRadius: core, maxCore };
    }

    function makeGrid(w, h, fill = WALL) {
      return Array.from({ length: h }, () => Array(w).fill(fill));
    }

    function inBounds(x, y, w, h) {
      return x >= 0 && y >= 0 && x < w && y < h;
    }

    function carveCell(grid, x, y, ch) {
      if (inBounds(x, y, grid[0].length, grid.length)) grid[y][x] = ch;
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function key(x, y) {
      return `${x},${y}`;
    }

    function paintHtml() {
      const colors = {
        [WALL]: 'var(--wall)',
        [LAB]: 'var(--labyrinth)',
        [CONN]: 'var(--connector)',
        [MAZE]: 'var(--maze)',
        [ENTRY]: 'var(--entry)',
        [EXIT]: 'var(--exit)'
      };

      let html = '';
      for (let y = 0; y < grid.length; y++) {
        for (let x = 0; x < grid[0].length; x++) {
          if (mousePos && mousePos[0] === x && mousePos[1] === y) {
            html += `<span style="color:#fff">${MOUSE}</span>`;
          } else {
            const ch = grid[y][x];
            html += `<span style="color:${colors[ch] || 'var(--wall)'}">${ch}</span>`;
          }
        }
        html += '\n';
      }
      gridEl.innerHTML = html;
    }

    function bfsDistances(start, passableFn) {
      const q = [start];
      const dist = new Map();
      dist.set(key(start[0], start[1]), 0);

      while (q.length) {
        const [x, y] = q.shift();
        const base = dist.get(key(x, y));
        for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
          const nx = x + dx;
          const ny = y + dy;
          const k = key(nx, ny);
          if (!inBounds(nx, ny, grid[0].length, grid.length)) continue;
          if (!passableFn(nx, ny)) continue;
          if (dist.has(k)) continue;
          dist.set(k, base + 1);
          q.push([nx, ny]);
        }
      }

      return dist;
    }

    function carveRandomizedLabyrinth(grid, cx, cy, outerRadius, innerRadius) {
      let candidates = [];
      for (let x = 1; x < grid[0].length - 1; x += 2) {
        candidates.push([x, 1]);
        candidates.push([x, grid.length - 2]);
      }
      for (let y = 3; y < grid.length - 3; y += 2) {
        candidates.push([1, y]);
        candidates.push([grid[0].length - 2, y]);
      }

      const start = candidates[Math.floor(Math.random() * candidates.length)];
      const target = [cx, cy - innerRadius - 1];

      let x = start[0];
      let y = start[1];
      carveCell(grid, x, y, LAB);
      const path = [[x, y]];

      while (x !== target[0] || y !== target[1]) {
        const options = [];
        if (x < target[0]) options.push([x + 1, y, 3]);
        if (x > target[0]) options.push([x - 1, y, 3]);
        if (y < target[1]) options.push([x, y + 1, 3]);
        if (y > target[1]) options.push([x, y - 1, 3]);

        for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
          const nx = x + dx;
          const ny = y + dy;
          if (!inBounds(nx, ny, grid[0].length, grid.length)) continue;
          if (nx <= 0 || ny <= 0 || nx >= grid[0].length - 1 || ny >= grid.length - 1) continue;
          options.push([nx, ny, 1]);
        }

        const weighted = [];
        for (const option of options) {
          for (let i = 0; i < option[2]; i++) weighted.push(option);
        }
        shuffle(weighted);

        let moved = false;
        for (const [nx, ny] of weighted) {
          const already = grid[ny][nx] !== WALL;
          const manhattan = Math.abs(nx - target[0]) + Math.abs(ny - target[1]);
          const curManhattan = Math.abs(x - target[0]) + Math.abs(y - target[1]);
          const acceptableWander = Math.random() < 0.28;
          if (already) continue;
          if (manhattan <= curManhattan || acceptableWander) {
            x = nx;
            y = ny;
            carveCell(grid, x, y, LAB);
            path.push([x, y]);
            moved = true;
            break;
          }
        }

        if (!moved) {
          const directX = x + Math.sign(target[0] - x);
          const directY = y + Math.sign(target[1] - y);
          if (x !== target[0] && inBounds(directX, y, grid[0].length, grid.length) && grid[y][directX] === WALL) {
            x = directX;
          } else if (y !== target[1] && inBounds(x, directY, grid[0].length, grid.length) && grid[directY][x] === WALL) {
            y = directY;
          } else {
            break;
          }
          carveCell(grid, x, y, LAB);
          path.push([x, y]);
        }
      }

      return { start, innerGate: [x, y], path };
    }

    function carveMazeCore(grid, x0, y0, size) {
      const visited = new Set();
      const dirs = [[2,0],[-2,0],[0,2],[0,-2]];

      function insideCore(x, y) {
        return x > x0 && y > y0 && x < x0 + size - 1 && y < y0 + size - 1;
      }

      function dfs(x, y) {
        visited.add(key(x, y));
        carveCell(grid, x, y, MAZE);
        for (const [dx, dy] of shuffle([...dirs])) {
          const nx = x + dx;
          const ny = y + dy;
          if (!insideCore(nx, ny)) continue;
          if (visited.has(key(nx, ny))) continue;
          carveCell(grid, x + dx / 2, y + dy / 2, MAZE);
          dfs(nx, ny);
        }
      }

      const sx = x0 + 1 + (Math.floor(Math.random() * Math.max(1, Math.floor((size - 2) / 2))) * 2);
      const sy = y0 + 1 + (Math.floor(Math.random() * Math.max(1, Math.floor((size - 2) / 2))) * 2);
      dfs(sx, sy);
    }

    function findCoreBoundaryPoints(cx, cy, coreRadius) {
      const points = [];
      for (let x = cx - coreRadius; x <= cx + coreRadius; x++) {
        points.push([x, cy - coreRadius]);
        points.push([x, cy + coreRadius]);
      }
      for (let y = cy - coreRadius + 1; y <= cy + coreRadius - 1; y++) {
        points.push([cx - coreRadius, y]);
        points.push([cx + coreRadius, y]);
      }
      return shuffle(points);
    }

    function carveConnector(grid, start, end) {
      let x = start[0];
      let y = start[1];
      while (x !== end[0] || y !== end[1]) {
        if (grid[y][x] === WALL) carveCell(grid, x, y, CONN);
        const dx = Math.sign(end[0] - x);
        const dy = Math.sign(end[1] - y);
        if ((dx !== 0 && dy !== 0 && Math.random() < 0.5) || dy === 0) x += dx;
        else y += dy;
      }
      if (grid[y][x] === WALL) carveCell(grid, x, y, CONN);
    }

    function getLabDepth() {
      return Math.max(1, Math.min(7, parseInt(labDepthInput.value, 10) || 4));
    }

    function carveLabyrinthRing(grid, cx, cy, outerR, innerR) {
      const w = grid[0].length;
      const h = grid.length;
      const labDepth = getLabDepth();

      const outerRX = Math.max(outerR, Math.floor((w / 2) - 3));
      const outerRY = Math.max(innerR + 4, Math.min(outerR, Math.floor((h / 2) - 3)));
      const innerRX = Math.max(innerR + 2, Math.floor(outerRX * Math.max(0.22, 0.42 - labDepth * 0.02)));
      const innerRY = Math.max(innerR, Math.floor(outerRY * Math.max(0.50, 0.70 - labDepth * 0.015)));

      function ellipseNorm(x, y, rx, ry) {
        const dx = x - cx;
        const dy = y - cy;
        return ((dx * dx) / (rx * rx)) + ((dy * dy) / (ry * ry));
      }

      function shellProgress(x, y) {
        const outerNorm = ellipseNorm(x, y, outerRX, outerRY);
        const innerNorm = ellipseNorm(x, y, innerRX, innerRY);
        const outerGap = Math.max(0, 1 - outerNorm);
        const innerGap = Math.max(0, innerNorm - 1);
        const total = outerGap + innerGap;
        if (total <= 0.0001) return 0.5;
        return outerGap / total;
      }

      function inShell(x, y) {
        if (!inBounds(x, y, w, h)) return false;
        if (x <= 1 || y <= 1 || x >= w - 2 || y >= h - 2) return false;
        const outerNorm = ellipseNorm(x, y, outerRX, outerRY);
        const innerNorm = ellipseNorm(x, y, innerRX, innerRY);
        return outerNorm <= 1 && innerNorm >= 1;
      }

      function nearInnerBoundary(x, y) {
        const innerNorm = ellipseNorm(x, y, innerRX, innerRY);
        return innerNorm >= 0.94 && innerNorm <= 1.12;
      }

      function outerCandidates() {
        const pts = [];
        for (let y = 2; y < h - 2; y++) {
          for (let x = 2; x < w - 2; x++) {
            if (!inShell(x, y)) continue;
            const outerNorm = ellipseNorm(x, y, outerRX, outerRY);
            if (outerNorm >= 0.82) pts.push([x, y]);
          }
        }
        return shuffle(pts);
      }

      function shellCandidatesForBand(minP, maxP) {
        const pts = [];
        for (let y = 2; y < h - 2; y++) {
          for (let x = 2; x < w - 2; x++) {
            if (!inShell(x, y)) continue;
            const p = shellProgress(x, y);
            if (p >= minP && p <= maxP) pts.push([x, y]);
          }
        }
        return shuffle(pts);
      }

      function pickSpreadWaypoint(pool, prior, minManhattan) {
        for (const p of pool) {
          if (!prior) return p;
          const md = Math.abs(p[0] - prior[0]) + Math.abs(p[1] - prior[1]);
          if (md >= minManhattan) return p;
        }
        return pool[0] || null;
      }

      function labNeighborCount(x, y) {
        let n = 0;
        for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
          const nx = x + dx;
          const ny = y + dy;
          if (!inBounds(nx, ny, w, h)) continue;
          if (grid[ny][nx] === LAB) n++;
        }
        return n;
      }

      function wouldCauseCrowding(x, y, prev) {
        let nearby = 0;
        for (let dy = -1; dy <= 1; dy++) {
          for (let dx = -1; dx <= 1; dx++) {
            if (dx === 0 && dy === 0) continue;
            const nx = x + dx;
            const ny = y + dy;
            if (!inBounds(nx, ny, w, h)) continue;
            if (prev && nx === prev[0] && ny === prev[1]) continue;
            if (grid[ny][nx] === LAB) nearby++;
          }
        }
        return nearby >= 2;
      }

      function carvePoint(path, x, y) {
        carveCell(grid, x, y, LAB);
        const last = path[path.length - 1];
        if (!last || last[0] !== x || last[1] !== y) {
          path.push([x, y]);
        }
      }

      function erasePath(path) {
        for (const [x, y] of path) {
          if (grid[y][x] === LAB) grid[y][x] = WALL;
        }
      }

      const shellWidthHint = Math.max(8, outerRX - innerRX);
      const shellHeightHint = Math.max(6, outerRY - innerRY);
      const spreadBase = Math.max(10, Math.floor((shellWidthHint * 1.35) + (shellHeightHint * 0.55)));
      const outerHoldBias = 2.0 + (labDepth * 0.75);
      const innerPenaltyBias = 1.4 + (labDepth * 0.85);
      const midBandBonus = 1.25 + (labDepth * 0.2);
      const sameDirBonus = 2.2 + (labDepth * 0.2);
      const targetPull = Math.max(1.0, 1.85 - labDepth * 0.07);
      const futureSpaceBonus = 0.28 + (labDepth * 0.035);
      const minWaypointsBeforeInner = Math.max(4, 4 + labDepth);
      const minPathBeforeInner = Math.max(22, Math.floor(spreadBase * (2.2 + labDepth * 0.48)));

      function scoreStep(current, prev, dir, target, preferredTurnDir, depthBias, pathLen) {
        const nx = current[0] + dir[0];
        const ny = current[1] + dir[1];
        if (!inShell(nx, ny)) return -Infinity;
        if (grid[ny][nx] !== WALL) return -Infinity;
        if (labNeighborCount(nx, ny) > 1) return -Infinity;
        if (wouldCauseCrowding(nx, ny, current)) return -Infinity;

        let score = Math.random() * 1.1;

        const curDx = target[0] - current[0];
        const curDy = target[1] - current[1];
        const nextDx = target[0] - nx;
        const nextDy = target[1] - ny;
        const curManhattan = Math.abs(curDx) + Math.abs(curDy);
        const nextManhattan = Math.abs(nextDx) + Math.abs(nextDy);
        score += (curManhattan - nextManhattan) * targetPull;

        if (prev) {
          const lastDir = [current[0] - prev[0], current[1] - prev[1]];
          if (dir[0] === lastDir[0] && dir[1] === lastDir[1]) score += sameDirBonus;
          if (dir[0] === -lastDir[0] && dir[1] === -lastDir[1]) score -= 6.0;
          const turn = lastDir[0] * dir[1] - lastDir[1] * dir[0];
          if (turn === preferredTurnDir) score += 1.0 + labDepth * 0.08;
        }

        const p = shellProgress(nx, ny);
        if (depthBias === 'outer') {
          if (p >= Math.min(0.82, 0.58 + labDepth * 0.04)) score += outerHoldBias;
          if (p <= 0.38) score -= innerPenaltyBias;
        } else if (depthBias === 'mid') {
          if (p >= Math.max(0.20, 0.34 - labDepth * 0.02) && p <= Math.min(0.80, 0.68 + labDepth * 0.02)) score += midBandBonus;
          if (p <= 0.18) score -= 1.0 + labDepth * 0.3;
        } else if (depthBias === 'inner') {
          if (pathLen < minPathBeforeInner) {
            score -= 3.9 + labDepth * 0.7;
            if (p <= 0.22) score -= 2.6 + labDepth * 0.45;
          } else {
            if (p <= 0.24) score += 1.8 + labDepth * 0.2;
          }
        }

        if (Math.abs(nx - cx) > Math.abs(ny - cy)) score += 0.18 + labDepth * 0.03;

        let future = 0;
        for (const [fdx, fdy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
          const fx = nx + fdx;
          const fy = ny + fdy;
          if (!inShell(fx, fy)) continue;
          if (!inBounds(fx, fy, w, h)) continue;
          if (grid[fy][fx] === WALL) future++;
        }
        score += future * futureSpaceBonus;

        return score;
      }

      function carveTowardTarget(path, start, target, preferredTurnDir, depthBias, maxSteps = 2400) {
        let current = [start[0], start[1]];
        let prev = path.length > 1 ? path[path.length - 2] : null;
        let steps = 0;

        while (steps < maxSteps) {
          steps++;
          if (Math.abs(current[0] - target[0]) + Math.abs(current[1] - target[1]) <= 1) break;

          const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
          const ranked = dirs
            .map(dir => ({
              dir,
              score: scoreStep(current, prev, dir, target, preferredTurnDir, depthBias, path.length)
            }))
            .filter(x => x.score > -Infinity)
            .sort((a, b) => b.score - a.score);

          if (!ranked.length) break;

          const bandWidth = depthBias === 'inner' ? 0.85 : (1.0 + labDepth * 0.09);
          const band = ranked.filter(r => r.score >= ranked[0].score - bandWidth);
          const choice = band[Math.floor(Math.random() * band.length)];
          const nx = current[0] + choice.dir[0];
          const ny = current[1] + choice.dir[1];

          carvePoint(path, nx, ny);
          prev = current;
          current = [nx, ny];
        }

        return current;
      }

      const startPool = outerCandidates();
      const start = startPool[0] || [cx + outerRX - 2, cy];
      const path = [];
      carvePoint(path, start[0], start[1]);

      const outerPool = shellCandidatesForBand(Math.min(0.86, 0.58 + labDepth * 0.04), 0.98);
      const midPool = shellCandidatesForBand(Math.max(0.18, 0.32 - labDepth * 0.02), Math.min(0.80, 0.68 + labDepth * 0.02));
      const innerPool = shellCandidatesForBand(0.04, Math.max(0.18, 0.28 - labDepth * 0.02));

      const preferredTurnDir = Math.random() < 0.5 ? -1 : 1;
      const waypoints = [];
      let prior = start;
      const spreadOuter = Math.max(12, Math.floor(spreadBase * (1.1 + labDepth * 0.08)));
      const spreadMid = Math.max(8, Math.floor(spreadBase * (0.82 + labDepth * 0.05)));
      const spreadInner = Math.max(5, Math.floor(spreadBase * (0.46 + labDepth * 0.025)));

      const phasePattern = [];
      for (let i = 0; i < minWaypointsBeforeInner; i++) {
        if (i % 4 === 0 || i % 4 === 2) phasePattern.push({ pool: outerPool, bias: 'outer', spread: spreadOuter });
        else phasePattern.push({ pool: midPool, bias: 'mid', spread: spreadMid });
      }
      phasePattern.push({ pool: midPool, bias: 'mid', spread: Math.max(7, spreadMid - 2) });
      phasePattern.push({ pool: innerPool, bias: 'inner', spread: spreadInner });

      for (const phase of phasePattern) {
        const wp = pickSpreadWaypoint(phase.pool, prior, phase.spread);
        if (wp) {
          waypoints.push({ pt: wp, bias: phase.bias });
          prior = wp;
        }
      }

      const innerBoundaryPool = shellCandidatesForBand(0.00, 0.10)
        .filter(([x, y]) => nearInnerBoundary(x, y));

      const finalTarget = pickSpreadWaypoint(innerBoundaryPool, prior, Math.max(4, Math.floor(spreadBase * 0.35)))
        || [cx, cy - innerRY];

      let cursor = start;
      for (const wp of waypoints) {
        cursor = carveTowardTarget(path, cursor, wp.pt, preferredTurnDir, wp.bias, 3200 + labDepth * 350);
      }
      cursor = carveTowardTarget(path, cursor, finalTarget, preferredTurnDir, 'inner', 4600 + labDepth * 400);

      if (path.length < Math.max(16, minPathBeforeInner * 0.55)) {
        erasePath(path);

        const fallback = [];
        let x = start[0];
        let y = start[1];
        carvePoint(fallback, x, y);

        const simpleTargets = [
          [Math.max(2, cx - Math.floor(outerRX * 0.55)), y],
          [Math.max(2, cx - Math.floor(outerRX * 0.55)), Math.min(h - 3, cy + Math.floor(outerRY * 0.55))],
          [Math.min(w - 3, cx + Math.floor(outerRX * 0.45)), Math.min(h - 3, cy + Math.floor(outerRY * 0.40))],
          [Math.min(w - 3, cx + Math.floor(outerRX * 0.32)), Math.max(2, cy - Math.floor(outerRY * 0.58))],
          finalTarget
        ];

        let cur = [x, y];
        for (const t of simpleTargets) {
          cur = carveTowardTarget(fallback, cur, t, preferredTurnDir, 'mid', 2600 + labDepth * 220);
        }

        return {
          entry: fallback[0],
          exit: fallback[fallback.length - 1],
          path: fallback
        };
      }

      return {
        entry: path[0],
        exit: path[path.length - 1],
        path
      };
    }

    function placeExitFarFromStart(coreCells, start) {
      const dist = bfsDistances(start, (x, y) => grid[y][x] !== WALL);
      let best = null;
      let bestD = -1;
      for (const [x, y] of coreCells) {
        const d = dist.get(key(x, y));
        if (d != null && d > bestD) {
          bestD = d;
          best = [x, y];
        }
      }
      return best;
    }

    function collectCoreCells() {
      const cells = [];
      for (let y = 0; y < grid.length; y++) {
        for (let x = 0; x < grid[0].length; x++) {
          if (grid[y][x] === MAZE) cells.push([x, y]);
        }
      }
      return cells;
    }

    function countTiles(ch) {
      let n = 0;
      for (let y = 0; y < grid.length; y++) {
        for (let x = 0; x < grid[0].length; x++) {
          if (grid[y][x] === ch) n++;
        }
      }
      return n;
    }

    function evaluateLevelQuality(start, exit) {
      const dist = bfsDistances(start, (x, y) => grid[y][x] !== WALL);
      const exitDist = dist.get(key(exit[0], exit[1]));

      if (exitDist == null) {
        return { ok: false, score: -999999 };
      }

      const reachableCount = dist.size;
      const labCount = countTiles(LAB);
      const mazeCount = countTiles(MAZE);
      const connCount = countTiles(CONN);

      const minExitDist = Math.max(55, Math.floor((grid[0].length + grid.length) * 0.55));
      const minReachable = Math.max(120, Math.floor((labCount + mazeCount + connCount) * 0.72));

      const ok =
        exitDist >= minExitDist &&
        reachableCount >= minReachable &&
        labCount >= 45 &&
        mazeCount >= 25;

      const score =
        exitDist * 4 +
        reachableCount * 1.5 +
        labCount * 1.2 +
        mazeCount * 0.8 +
        connCount * 0.4;

      return { ok, score };
    }

    function getNeighbors(x, y) {
      const out = [];
      for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
        const nx = x + dx;
        const ny = y + dy;
        if (!inBounds(nx, ny, grid[0].length, grid.length)) continue;
        if (grid[ny][nx] === WALL) continue;
        out.push([nx, ny]);
      }
      return out;
    }

    function createExplorer(start, exit) {
      return {
        start: [...start],
        exit: [...exit],
        stack: [[...start]],
        visited: new Set([key(start[0], start[1])]),
        deadEnds: new Set(),
        lastDir: null,
        solved: false,
        finished: false
      };
    }

    function getIntelligence() {
      return Math.max(1, Math.min(10, parseInt(document.getElementById('intelligence').value, 10) || 5));
    }

    function directionBetween(from, to) {
      return [Math.sign(to[0] - from[0]), Math.sign(to[1] - from[1])];
    }

    function sameDir(a, b) {
      return !!a && !!b && a[0] === b[0] && a[1] === b[1];
    }

    function reverseDir(a, b) {
      return !!a && !!b && a[0] === -b[0] && a[1] === -b[1];
    }

    function scoreMove(current, next, state) {
      const intelligence = getIntelligence();
      const dir = directionBetween(current, next);
      let score = Math.random() * 2;

      if (state.lastDir) {
        if (sameDir(dir, state.lastDir)) score += intelligence * 1.6;
        if (reverseDir(dir, state.lastDir)) score -= intelligence * 2.2;
      }

      if (state.deadEnds.has(key(next[0], next[1]))) {
        score -= intelligence * 3.0;
      }

      const curDist = Math.abs(current[0] - state.exit[0]) + Math.abs(current[1] - state.exit[1]);
      const nextDist = Math.abs(next[0] - state.exit[0]) + Math.abs(next[1] - state.exit[1]);
      score += (curDist - nextDist) * (0.25 * intelligence);

      const onward = getNeighbors(next[0], next[1]).filter(([nx, ny]) => !state.visited.has(key(nx, ny))).length;
      score += onward * (0.12 * intelligence);

      return score;
    }

    function explorerStep(state) {
      if (state.finished) return 'finished';

      const current = state.stack[state.stack.length - 1];
      const [x, y] = current;
      mousePos = [x, y];

      if (x === state.exit[0] && y === state.exit[1]) {
        state.solved = true;
        state.finished = true;
        return 'solved';
      }

      const candidates = getNeighbors(x, y).filter(([nx, ny]) => !state.visited.has(key(nx, ny)));

      if (candidates.length > 0) {
        const ranked = candidates
          .map(next => ({ next, score: scoreMove(current, next, state) }))
          .sort((a, b) => b.score - a.score);

        const next = ranked[0].next;
        state.visited.add(key(next[0], next[1]));
        state.stack.push(next);
        state.lastDir = directionBetween(current, next);
        mousePos = [...next];
        return 'forward';
      }

      state.deadEnds.add(key(x, y));

      if (state.stack.length > 1) {
        const from = state.stack.pop();
        const back = state.stack[state.stack.length - 1];
        state.lastDir = directionBetween(from, back);
        mousePos = [...back];
        return 'backtrack';
      }

      state.finished = true;
      return 'stuck';
    }

    function generateLevel() {
      if (isSessionComplete) return;
      const { w, h, coreRadius } = sanitizeInputs();

      let bestSnapshot = null;
      let bestScore = -Infinity;

      for (let attempt = 0; attempt < 40; attempt++) {
        grid = makeGrid(w, h, WALL);

        const cx = Math.floor(w / 2);
        const cy = Math.floor(h / 2);
        const outerRadius = Math.min(cx, cy) - 2;
        const coreSize = coreRadius * 2 + 1;
        const coreX0 = cx - coreRadius;
        const coreY0 = cy - coreRadius;

        const labyrinthInner = coreRadius + 2;
        const labDepth = getLabDepth();
        const labyrinthOuter = Math.max(
          labyrinthInner + 5,
          Math.min(coreRadius + 10 + (labDepth * 3), outerRadius - 1)
        );
        const approachInnerRadius = Math.max(
          labyrinthOuter + 1,
          Math.min(labyrinthOuter + 4, outerRadius - 1)
        );

        const approach = carveRandomizedLabyrinth(grid, cx, cy, outerRadius, approachInnerRadius);
        const labyrinth = carveLabyrinthRing(grid, cx, cy, labyrinthOuter, labyrinthInner);
        carveConnector(grid, approach.innerGate, labyrinth.entry);

        carveMazeCore(grid, coreX0, coreY0, coreSize);

        const boundaryCandidates = findCoreBoundaryPoints(cx, cy, coreRadius)
          .filter(([x, y]) => grid[y] && grid[y][x] === MAZE);

        const target = boundaryCandidates.length
          ? boundaryCandidates[Math.floor(Math.random() * boundaryCandidates.length)]
          : [cx, cy];

        carveConnector(grid, labyrinth.exit, target);

        const start = approach.start;
        carveCell(grid, start[0], start[1], ENTRY);

        const coreCells = collectCoreCells();
        const exit = (coreCells.length > 0)
          ? (placeExitFarFromStart(coreCells, start) || coreCells[Math.floor(Math.random() * coreCells.length)])
          : [cx, cy];
        carveCell(grid, exit[0], exit[1], EXIT);

        const quality = evaluateLevelQuality(start, exit);

        if (quality.score > bestScore) {
          bestScore = quality.score;
          bestSnapshot = {
            grid: grid.map(row => [...row]),
            start: [...start],
            exit: [...exit]
          };
        }

        if (quality.ok) {
          iterationCount++;
          mousePos = [...start];
          explorerState = createExplorer(start, exit);
          lastResultEl.textContent = 'In Progress';
          updateStats();
          startMapTimer();
          paintHtml();
          return;
        }
      }

      if (bestSnapshot) {
        iterationCount++;
        grid = bestSnapshot.grid.map(row => [...row]);
        mousePos = [...bestSnapshot.start];
        explorerState = createExplorer(bestSnapshot.start, bestSnapshot.exit);
        lastResultEl.textContent = 'In Progress';
        updateStats();
        startMapTimer();
        paintHtml();
        return;
      }

      mousePos = null;
      explorerState = null;
      paintHtml();
    }

    function getRunDelayMs() {
      const speed = Math.max(1, Math.min(10, parseInt(document.getElementById('speed').value, 10) || 5));
      const startMs = 750;
      const endMs = 10;
      const delay = startMs - ((speed - 1) * ((startMs - endMs) / 9));
      return Math.max(8, delay);
    }

    function completeSession(resultLabel) {
      isSessionComplete = true;
      finalizeRun(resultLabel);
      runStatusEl.textContent = 'Complete';
      lastResultEl.textContent = `${resultLabel} | Final`;
      stopMapTimer();
      paintHtml();
    }

    async function runMouse() {
      const myRunId = ++currentRunId;

      while (true) {
        if (myRunId !== currentRunId) return;
        const result = explorerStep(explorerState);
        paintHtml();

        if (result === 'solved') {
          finalizeRun('Solved');
          if (iterationCount >= MAX_ITERATIONS) {
            completeSession('Solved');
            return;
          }
          await new Promise(r => setTimeout(r, 700));
          if (myRunId !== currentRunId || isSessionComplete) return;
          generateLevel();
          runMouse();
          return;
        }

        if (result === 'stuck' || result === 'finished') {
          finalizeRun(result === 'stuck' ? 'Stuck' : 'Finished');
          if (iterationCount >= MAX_ITERATIONS) {
            completeSession(result === 'stuck' ? 'Stuck' : 'Finished');
            return;
          }
          await new Promise(r => setTimeout(r, 700));
          if (myRunId !== currentRunId || isSessionComplete) return;
          generateLevel();
          runMouse();
          return;
        }

        await new Promise(r => setTimeout(r, getRunDelayMs()));
      }
    }

    function restart() {
      if (isSessionComplete || iterationCount >= MAX_ITERATIONS) {
        isSessionComplete = false;
      }
      currentRunId++;
      stopMapTimer();
      generateLevel();
      if (!explorerState) {
        completeSession('No Valid Map');
        return;
      }
      runMouse();
    }

    regenBtn.addEventListener('click', restart);
    widthInput.addEventListener('change', sanitizeInputs);
    heightInput.addEventListener('change', sanitizeInputs);
    coreInput.addEventListener('change', sanitizeInputs);
    labDepthInput.addEventListener('change', () => {
      labDepthInput.value = getLabDepth();
    });
    sanitizeInputs();
    updateStats();
    restart();
  </script>
</body>
